name: Build & Deploy

on:
  # Rebuild on changes to the site itself.
  push:
    branches: [master]
  # Manual rebuilds.
  workflow_dispatch:
  # Rebuild whenever a package in the kaiseki namespace is updated.
  # Each package repo sends this event on push to its default branch
  # (see templates/notify-site.yml).
  repository_dispatch:
    types: [package-updated]

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Astro 6 requires Node >= 22.12.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clone kaiseki packages (content sources)
        run: node scripts/clone-packages.mjs
        env:
          # Public repos clone anonymously; the token raises the API rate limit.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        run: pnpm build
        env:
          SITE: ${{ steps.pages.outputs.origin }}
          BASE: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
