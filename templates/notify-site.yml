# Add this workflow to each kaiseki package repository as
# `.github/workflows/notify-site.yml`.
#
# On every push to the default branch it tells the kaiseki-site repo to rebuild,
# so the documentation site always reflects the latest README / docs.
#
# Prerequisite: a repository (or organisation) secret named `SITE_DISPATCH_TOKEN`
# containing a token that can dispatch workflows on `kaisekidev/kaiseki-site`:
#   - Fine-grained PAT with "Contents: read" + "Metadata: read" on kaiseki-site,
#     or a classic PAT with the `repo` scope.
# Store it via: gh secret set SITE_DISPATCH_TOKEN --repo kaisekidev/<this-repo>

name: Notify docs site

on:
  push:
    branches: [master, main]
  # Also fire when a release is published, if you tag releases.
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch rebuild of kaiseki-site
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kaisekidev/kaiseki-site/dispatches \
            -d '{"event_type":"package-updated","client_payload":{"repo":"${{ github.repository }}","sha":"${{ github.sha }}"}}'
